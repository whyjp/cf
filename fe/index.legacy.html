<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>camfit-puller — 캠핑장 지도</title>

<!-- Pretendard 한글 -->
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<!-- Tailwind utility (CDN, prototype-grade) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- React + Babel (UMD prototype) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --moss: #2c4a3e;
    --moss-deep: #1a2f26;
    --moss-soft: #cfdcc9;
    --bark: #6b4f2c;
    --paper: #f4f1e8;
    --paper-2: #ebe5d2;
    --ink: #1a1a17;
    --ember: #c8553d;
  }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard Variable", Pretendard, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background:
      radial-gradient(1200px 800px at 80% -20%, rgba(44,74,62,0.08), transparent 70%),
      repeating-linear-gradient(135deg, transparent 0 28px, rgba(44,74,62,0.045) 28px 29px),
      var(--paper);
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .topo {
    /* topographic-feeling SVG background */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='560' height='560'><g fill='none' stroke='%232c4a3e' stroke-opacity='0.08' stroke-width='0.8'><path d='M0,300 C100,250 200,360 300,300 S500,250 600,300'/><path d='M-30,330 C100,280 200,390 300,330 S500,280 600,330'/><path d='M-30,360 C100,310 200,420 300,360 S500,310 600,360'/><path d='M-30,260 C100,210 200,320 300,260 S500,210 600,260'/><path d='M-30,200 C100,150 200,260 300,200 S500,150 600,200'/></g></svg>");
    background-size: 560px 560px;
  }
  .display { font-feature-settings: "ss01","tnum"; letter-spacing: -0.02em; }
  .hairline { border-color: rgba(26,26,23,0.12); }
  .chip {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500;
    background: rgba(44,74,62,0.08); color: var(--moss-deep);
    border: 1px solid rgba(44,74,62,0.14);
  }
  .chip.warm { background: rgba(200,85,61,0.08); color: var(--ember); border-color: rgba(200,85,61,0.18); }
  .chip.bark { background: rgba(107,79,44,0.08); color: var(--bark); border-color: rgba(107,79,44,0.2); }
  .btn {
    border: 1px solid rgba(26,26,23,0.18); background: var(--paper); color: var(--ink);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500;
    transition: all 0.15s ease;
  }
  .btn:hover { background: var(--paper-2); border-color: rgba(26,26,23,0.32); }
  .btn-primary {
    background: var(--moss); color: #f7f4e8; border-color: var(--moss-deep);
  }
  .btn-primary:hover { background: var(--moss-deep); }
  .toggle-pill {
    background: rgba(26,26,23,0.06); border-radius: 999px; padding: 2px;
    display: inline-flex; gap: 2px;
  }
  .toggle-pill button { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; color: rgba(26,26,23,0.5); }
  .toggle-pill button.active { background: var(--moss); color: #f7f4e8; }
  .card {
    background: var(--paper);
    border: 1px solid rgba(26,26,23,0.10);
    border-radius: 14px;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .card:hover { transform: translateY(-1px); border-color: rgba(26,26,23,0.28); box-shadow: 0 12px 28px -18px rgba(26,26,23,0.45); }
  .num { font-variant-numeric: tabular-nums; }
  .kbd {
    font-family: ui-monospace, SFMono-Regular, "JetBrains Mono", monospace;
    font-size: 11px; padding: 1px 6px; border-radius: 4px;
    background: rgba(26,26,23,0.07); border: 1px solid rgba(26,26,23,0.13);
  }
  .leaflet-container {
    background: #e7e1cf;
    font-family: inherit;
  }
  .pin-cluster {
    background: var(--moss); color: #f7f4e8; border-radius: 999px;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; box-shadow: 0 2px 8px rgba(26,26,23,0.25);
    border: 2px solid #f4f1e8;
  }
  .pin-cluster.lg { width: 46px; height: 46px; font-size: 14px; }
  .pin-pin {
    width: 20px; height: 20px; border-radius: 999px;
    background: var(--moss); border: 2.5px solid #f7f4e8;
    box-shadow: 0 1.5px 4px rgba(26,26,23,0.32);
  }
  /* One color per featured-axis id. Order matches FEATURED_AXES — when
     adding a new axis, paste its id here with a hex. Default (.pin-pin
     alone) stays moss-green for non-featured camps. */
  .pin-pin.valley     { background: #2c6e7b; }
  .pin-pin.kids       { background: #c8553d; }
  .pin-pin.trampoline { background: var(--bark); }
  .pin-pin.halloween  { background: #ff7518; }   /* pumpkin */
  .pin-pin.cherry     { background: #ffb7c5; }   /* sakura */
  .pin-pin.autumn     { background: #d35400; }   /* maple */
  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(26,26,23,0.2); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const API = (typeof location !== "undefined" && location.port === "8070")
  ? ""                      // FE served by FastAPI
  : "http://localhost:8070"; // dev: FE served separately

// ─────────────────────────────────────────────────────────────
// Hooks
// ─────────────────────────────────────────────────────────────
function useFacets() {
  // /facets shape: { regions:[{sido,sigungu,count}], concept_axes:[...], concepts:[...], themes:[...] }
  // (No `categories`/`facilities` keys — those were stale assumptions in older FE code.)
  const [data, setData] = useState({ regions: [], concept_axes: [], concepts: [], themes: [] });
  const [err, setErr] = useState(null);
  useEffect(() => {
    fetch(`${API}/facets`).then(r => r.json()).then(setData).catch(e => setErr(String(e)));
  }, []);
  return { data, err };
}

// Concept-shaped filter slots — these are unioned and sent as repeated
// `concept=<id>` params (server-side AND). Backend matches by concept ID
// (English, e.g. "valley", "mountainview", "swimmingpool"), NOT Korean name.
const CONCEPT_FILTER_KEYS = [
  "conceptAxis", "view", "facility", "kidsFacility",
  "surface", "space", "parking", "audience", "vibe",
];

function setSerialize(set) {
  // Stable string for useEffect dep arrays (Set identity changes every render).
  if (!set || set.size === 0) return "";
  return [...set].sort().join("|");
}

function useSites(filters) {
  // Server-side: `region` (single sido — fall back to client-side when >1 selected)
  // and `concept[]` (repeated, AND semantics, by concept ID).
  // Client-side filters (terrain/collection/facilityRaw/management) live in
  // App.visibleRows because they read columns that aren't indexed on the server.
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  const conceptKey = useMemo(
    () => CONCEPT_FILTER_KEYS.map(k => setSerialize(filters[k])).join("/"),
    CONCEPT_FILTER_KEYS.map(k => filters[k]) // re-key when any concept set changes
  );
  const regionKey = useMemo(() => setSerialize(filters.region), [filters.region]);

  useEffect(() => {
    const params = new URLSearchParams();
    // Region: only push to server when exactly one is picked. With 0 we want
    // the unfiltered result; with >1 we'll filter client-side to OR-union.
    if (filters.region.size === 1) {
      const [only] = filters.region;
      params.append("region", only);
    }
    // Concept-shape sets unioned → repeated concept= params (AND on backend).
    const conceptIds = new Set();
    for (const k of CONCEPT_FILTER_KEYS) {
      const s = filters[k];
      if (!s) continue;
      for (const v of s) conceptIds.add(v);
    }
    for (const id of conceptIds) params.append("concept", id);

    setLoading(true); setErr(null);
    fetch(`${API}/sites?${params.toString()}`)
      .then(r => r.json())
      .then(d => setRows(Array.isArray(d) ? d : []))
      .catch(e => setErr(String(e)))
      .finally(() => setLoading(false));
  }, [regionKey, conceptKey]);
  return { rows, loading, err };
}

function useManagementMarks() {
  // One-shot fetch of all camps that have a management mark, so the FE can
  // filter by the level (bib/recommended/notable/exceptional) without
  // re-querying the server on every chip change.
  const [byId, setById] = useState(null);
  useEffect(() => {
    fetch(`${API}/marks/management/camps?limit=2000`)
      .then(r => r.json())
      .then(arr => {
        const m = new Map();
        if (Array.isArray(arr)) for (const x of arr) m.set(x.camp_id, x.level);
        setById(m);
      })
      .catch(() => setById(new Map()));
  }, []);
  return byId;
}

function useDetail(id) {
  const [data, setData] = useState(null);
  useEffect(() => {
    if (!id) { setData(null); return; }
    fetch(`${API}/sites/${id}`).then(r => r.json()).then(setData).catch(() => setData(null));
  }, [id]);
  return data;
}

function useUserLocation() {
  // navigator.geolocation.getCurrentPosition — accurate (GPS or wifi
  // triangulation, ~10-50m). Returns { coords:{lat,lon}, status, refresh }.
  // status:
  //   "idle"      not asked yet (initial render frame)
  //   "asking"    permission prompt visible
  //   "ok"        coords populated
  //   "denied"    user blocked
  //   "error"     timeout / unavailable
  //   "unsupported"  browser has no geolocation API
  const [state, setState] = useState({ coords: null, status: "idle" });
  const fetch = useCallback(() => {
    if (typeof navigator === "undefined" || !navigator.geolocation) {
      setState({ coords: null, status: "unsupported" });
      return;
    }
    setState(s => ({ coords: s.coords, status: "asking" }));
    navigator.geolocation.getCurrentPosition(
      pos => setState({
        coords: { lat: pos.coords.latitude, lon: pos.coords.longitude },
        status: "ok",
      }),
      err => setState({
        coords: null,
        status: err.code === err.PERMISSION_DENIED ? "denied" : "error",
      }),
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 5 * 60 * 1000 },
    );
  }, []);
  useEffect(() => { fetch(); }, [fetch]);
  return { ...state, refresh: fetch };
}


// Haversine distance — kilometers. Used to sort camp list by proximity to
// the user's current location and to render the per-card distance badge.
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => (d * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function formatKm(km) {
  if (km == null) return "";
  if (km < 1) return `${Math.round(km * 1000)} m`;
  if (km < 10) return `${km.toFixed(1)} km`;
  return `${Math.round(km)} km`;
}


function useFeaturedAxes() {
  // GET /featured-axes once at mount → drives the 대표축 chip row, PinDots,
  // CampList per-card chips, FEATURED_NAMES dedup, and visibleRows boolean
  // filter loop. Empty fallback keeps the page functional if the endpoint
  // is unreachable; the 대표축 row simply doesn't render.
  const [axes, setAxes] = useState([]);
  useEffect(() => {
    fetch(`${API}/featured-axes`)
      .then(r => r.json())
      .then(d => setAxes(Array.isArray(d) ? d : []))
      .catch(() => setAxes([]));
  }, []);
  return axes;
}

async function fetchEtaBatch({ origin, ids, max_minutes, signal }) {
  const r = await fetch(`${API}/eta/batch`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ origin, ids, max_minutes, concurrency: 4, timeout_s: 12 }),
    signal,
  });
  if (!r.ok) throw new Error(`eta/batch ${r.status}`);
  return r.json();
}

// ─────────────────────────────────────────────────────────────
// Visual atoms
// ─────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────
// Featured-tag registry — rich UI for known categories/facilities.
// Anything not in this map renders as a generic dynamic chip.
// Add new entries here when new categories deserve dedicated visual treatment.
// ─────────────────────────────────────────────────────────────
// Featured-axis chip metadata is now backend-driven via GET /featured-axes —
// see useFeaturedAxes() below. The legacy hardcoded maps are gone; chip
// labels and the FEATURED_NAMES dedup set are derived from the API response.
function buildFeaturedNames(axes) {
  // Collection/facility chip rows skip names already shown as 대표축 chips.
  // Backend returns Korean labels; this mirror is what the dynamic-chip
  // filter uses to avoid duplicating axis chips in the long-tail rows.
  return new Set((axes || []).map(a => a.ko));
}

// Stable hash → palette for dynamic tags so same tag gets same color across renders.
const PALETTE = ["#5b6c8a", "#7c5e9a", "#3f7a6a", "#9a6e3a", "#8a5b6c", "#6a8a5b"];
function tagHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}
// "테마:대형견과함께" → "🎯 대형견과함께"  (and special icons for known prefixes)
function prettyTag(name) {
  if (typeof name !== "string") return name;
  if (name.startsWith("테마:")) return "🎯 " + name.slice(3);
  return name;
}

function PinDots({ row, axes }) {
  const list = axes || [];
  return (
    <div className="flex gap-1">
      {list.map(a => row[`has_${a.id}`] && (
        <span key={a.id} title={a.ko} className={`pin-pin ${a.id}`} />
      ))}
    </div>
  );
}

function DynamicChip({ name, active, onClick, count }) {
  const color = tagHue(name);
  const label = prettyTag(name);
  const baseStyle = {
    background: `${color}14`,
    color,
    borderColor: `${color}33`,
    boxShadow: active ? `inset 0 0 0 1.5px ${color}` : null,
  };
  return (
    <button onClick={onClick} className="chip" style={baseStyle} title={count != null ? `${count}곳` : ""}>
      {active ? "● " : ""}{label}{count != null ? <span className="opacity-60 ml-1 num">{count}</span> : null}
    </button>
  );
}

function EtaBadge({ minutes, within, error }) {
  if (minutes == null && !error) return null;
  if (error) return <span className="chip" title={error} style={{opacity:.55}}>🚗 ?</span>;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  const label = h > 0 ? `${h}시 ${m}분` : `${m}분`;
  const cls = within === false ? "chip" : "chip warm";
  const style = within === false ? { opacity: 0.55, textDecoration: "line-through" } : null;
  return <span className={cls} style={style}>🚗 {label}</span>;
}

function Chip({ children, tone }) {
  const cls = tone === "warm" ? "chip warm" : tone === "bark" ? "chip bark" : "chip";
  return <span className={cls}>{children}</span>;
}

function Stat({ label, value, sub }) {
  return (
    <div className="flex flex-col">
      <span className="text-[10px] uppercase tracking-[0.18em] text-stone-500 font-medium">{label}</span>
      <span className="display num text-2xl font-semibold leading-tight">{value}</span>
      {sub && <span className="text-[11px] text-stone-500 mt-0.5">{sub}</span>}
    </div>
  );
}

function LocationPill({ userLoc }) {
  // Header-corner indicator + retry button. Plain text per status, all
  // inline so it stays a single sibling among Stat / SearchBox / toggle.
  const { coords, status, refresh } = userLoc || {};
  const label = (() => {
    switch (status) {
      case "ok":          return `🧭 내 위치 사용 중 · ${coords.lat.toFixed(2)},${coords.lon.toFixed(2)}`;
      case "asking":      return "🧭 위치 권한 요청 중…";
      case "denied":      return "🧭 위치 차단됨 — 거리 정렬 비활성";
      case "error":       return "🧭 위치 가져오기 실패";
      case "unsupported": return "🧭 브라우저 위치 미지원";
      default:            return "🧭 위치 확인 중…";
    }
  })();
  const isFinal = status === "ok" || status === "denied" || status === "error" || status === "unsupported";
  return (
    <button
      onClick={refresh}
      title="클릭하여 위치 다시 가져오기"
      className="text-[10.5px] num"
      style={{
        background: status === "ok" ? "rgba(37,99,235,0.08)" : "rgba(26,26,23,0.05)",
        color: status === "ok" ? "#2563eb" : "rgba(26,26,23,0.6)",
        border: `1px solid ${status === "ok" ? "rgba(37,99,235,0.3)" : "rgba(26,26,23,0.13)"}`,
        borderRadius: "999px", padding: "3px 10px",
        cursor: isFinal ? "pointer" : "default",
      }}>
      {label}
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Map
// ─────────────────────────────────────────────────────────────
function MapView({ rows, onPick, focused, etaMap, axes, userLoc }) {
  const userMarkerRef = useRef(null);
  const mapRef = useRef(null);
  const layerRef = useRef(null);
  const mapEl = useRef(null);

  useEffect(() => {
    if (mapRef.current) return;
    // Korea-only bounds: SW (Marado / 제주 남쪽) → NE (북한 최북단). Pan/zoom
    // is clamped here so users can't drift to China/Japan tiles. Viscosity=1
    // hard-locks the bounds (no rubber-band).
    const KR_BOUNDS = L.latLngBounds([32.8, 124.0], [38.9, 132.0]);
    const map = L.map(mapEl.current, {
      center: [36.5, 127.8], zoom: 7, zoomControl: true,
      attributionControl: true, preferCanvas: true,
      minZoom: 6, maxZoom: 18,
      maxBounds: KR_BOUNDS,
      maxBoundsViscosity: 1.0,
      worldCopyJump: false,
    });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 18,
      bounds: KR_BOUNDS,
      noWrap: true,
    }).addTo(map);
    mapRef.current = map;
    layerRef.current = L.markerClusterGroup({
      iconCreateFunction: (cluster) => {
        const c = cluster.getChildCount();
        const cls = c >= 50 ? "pin-cluster lg" : "pin-cluster";
        return L.divIcon({ html: `<div class="${cls}">${c}</div>`, className: "", iconSize: null });
      },
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      // Tighter merge — default 80px clumps neighbouring camps too eagerly.
      // 35px keeps only true overlaps merged so individual pins stay visible.
      maxClusterRadius: 18,
      // Past zoom 12 (city-level), drop clustering entirely. Each camp gets
      // its own pin — useful when zooming into a popular sigungu.
      disableClusteringAtZoom: 12,
    });
    map.addLayer(layerRef.current);

    // Tile-gap fix — Leaflet leaves blank rows when its container resizes
    // without it knowing (header/filter bar height changes after first paint,
    // window resizes, etc.). ResizeObserver + a few delayed invalidations
    // catch every regrow path. The "stripe" rendering bug in the user's
    // screenshot was this: outer card got its final height after Leaflet's
    // initial sizing, so half the tile pane was still measured at 0.
    const invalidate = () => {
      try { map.invalidateSize({ animate: false, pan: false }); } catch (_) {}
    };
    [80, 240, 600, 1500].forEach(t => setTimeout(invalidate, t));
    let ro = null;
    if (typeof ResizeObserver !== "undefined" && mapEl.current) {
      ro = new ResizeObserver(() => invalidate());
      ro.observe(mapEl.current);
    }
    window.addEventListener("resize", invalidate);
    map.__cleanup = () => {
      window.removeEventListener("resize", invalidate);
      if (ro) ro.disconnect();
    };
  }, []);

  useEffect(() => {
    if (!layerRef.current) return;
    layerRef.current.clearLayers();
    const valid = rows.filter(r => r.lat != null && r.lon != null);
    valid.forEach(r => {
      // Pin tone = first matching featured-axis id (rendered as `pin-pin <id>`).
      // Falls back to "" (default moss-green pin) when no axis matches.
      const tone = (axes || []).find(a => r[`has_${a.id}`])?.id || "";
      const m = L.marker([r.lat, r.lon], {
        icon: L.divIcon({
          className: "",
          html: `<div class="pin-pin ${tone}" style="width:20px;height:20px;"></div>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        }),
        title: r.name,
      });
      m.on("click", () => onPick(r.id));
      const eta = etaMap?.[r.id];
      const etaLabel = eta && eta.minutes != null
        ? `<br/><span style="opacity:.85;color:#c8553d">🚗 ${Math.floor(eta.minutes / 60)}시 ${eta.minutes % 60}분</span>`
        : "";
      const addrLabel = r.address ? `<br/><span style="opacity:.6;font-size:10px">${r.address}</span>` : "";
      m.bindTooltip(`<b>${r.name}</b><br/><span style="opacity:.7">${r.sido || ""} ${r.sigungu || ""}</span>${addrLabel}${etaLabel}`,
        { direction: "top", offset: [0, -8] });
      layerRef.current.addLayer(m);
    });
    if (valid.length && !focused) {
      const bounds = L.latLngBounds(valid.map(r => [r.lat, r.lon]));
      mapRef.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 11 });
    }
  }, [rows, etaMap]);

  useEffect(() => {
    if (focused && focused.lat != null && focused.lon != null) {
      mapRef.current.setView([focused.lat, focused.lon], 13, { animate: true });
    }
  }, [focused]);

  // User-location pin — sky-blue dot, separate from the marker cluster
  // layer so it never gets clustered. Re-positions when coords update.
  useEffect(() => {
    if (!mapRef.current) return;
    const coords = userLoc && userLoc.coords;
    if (!coords) {
      if (userMarkerRef.current) {
        mapRef.current.removeLayer(userMarkerRef.current);
        userMarkerRef.current = null;
      }
      return;
    }
    const icon = L.divIcon({
      html: `<div style="width:18px;height:18px;border-radius:999px;
              background:#2563eb;border:3px solid #f7f4e8;
              box-shadow:0 0 0 6px rgba(37,99,235,0.18),0 1px 4px rgba(26,26,23,0.4);"></div>`,
      iconSize: [18, 18], iconAnchor: [9, 9], className: "",
    });
    if (userMarkerRef.current) {
      userMarkerRef.current.setLatLng([coords.lat, coords.lon]);
      userMarkerRef.current.setIcon(icon);
    } else {
      userMarkerRef.current = L.marker([coords.lat, coords.lon], {
        icon, zIndexOffset: 9999, interactive: true, title: "내 위치",
      }).addTo(mapRef.current);
      userMarkerRef.current.bindTooltip("내 위치", { direction: "top", offset: [0, -10] });
    }
  }, [userLoc && userLoc.coords && userLoc.coords.lat,
      userLoc && userLoc.coords && userLoc.coords.lon]);

  return <div ref={mapEl} className="w-full h-full" />;
}

function MiniMap({ lat, lon, name }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || lat == null || lon == null) return;
    const map = L.map(ref.current, { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false });
    map.setView([lat, lon], 13);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 16 }).addTo(map);
    L.marker([lat, lon], {
      icon: L.divIcon({ html: `<div class="pin-pin" style="width:18px;height:18px;"></div>`, iconSize: [18, 18], iconAnchor: [9, 9], className: "" }),
    }).addTo(map);
    // Same tile-gap workaround as the main map — detail panel slides in
    // after MiniMap mounts, so its parent's measured height changes after
    // first tile load.
    [80, 240, 600].forEach(t => setTimeout(() => { try { map.invalidateSize({ animate: false }); } catch (_) {} }, t));
    return () => map.remove();
  }, [lat, lon]);
  if (lat == null || lon == null) {
    return <div className="text-xs text-stone-500 italic px-3 py-6 bg-stone-200/50 rounded-lg">좌표 정보가 없는 캠프입니다.</div>;
  }
  return <div ref={ref} className="w-full h-44 rounded-lg overflow-hidden border hairline" title={name} />;
}

// Toggle a chip in a set with modifier-key semantics.
//   - Plain click: single-replace (or clear if it was the lone selection).
//   - Ctrl/Cmd/Shift+click: toggle membership (additive AND-mode).
function toggleChipSelection(currentSet, value, ev) {
  const next = new Set(currentSet);
  const additive = ev && (ev.ctrlKey || ev.metaKey || ev.shiftKey);
  if (additive) {
    if (next.has(value)) next.delete(value);
    else next.add(value);
    return next;
  }
  if (next.size === 1 && next.has(value)) return new Set();
  return new Set([value]);
}

// MultiChip — a chip whose `active` is "in this Set". onPick(value, ev) is
// called with the raw event so the helper above can read modifier keys.
function MultiChip({ value, label, count, active, onPick, color }) {
  const hue = color || tagHue(value);
  const style = {
    background: `${hue}14`,
    color: hue,
    borderColor: `${hue}33`,
    boxShadow: active ? `inset 0 0 0 1.5px ${hue}` : null,
  };
  return (
    <button
      onClick={(e) => onPick(value, e)}
      className="chip"
      style={style}
      title={count != null ? `${count}곳` : ""}>
      {active ? "● " : ""}{label}{count != null ? <span className="opacity-60 ml-1 num">{count}</span> : null}
    </button>
  );
}

function FilterRow({ heading, set, items, onToggle, onClear, slotKey, collapsed, onToggleCollapse }) {
  // items: [{ value, label, count }]; render nothing if empty
  if (!items || items.length === 0) return null;
  const selectedCount = set ? set.size : 0;
  const isCollapsed = !!collapsed;
  // Show count when collapsed (chips hidden) or when 2+ selected (existing behavior).
  const showCount = selectedCount > 0 && (isCollapsed || selectedCount >= 2);
  return (
    <div className="flex items-center gap-1.5 flex-wrap">
      <button
        type="button"
        onClick={() => onToggleCollapse && slotKey && onToggleCollapse(slotKey)}
        className="text-[10px] uppercase tracking-[0.2em] text-stone-500 mr-1 shrink-0 inline-flex items-center gap-1 hover:text-stone-700"
        title={isCollapsed ? "펼치기" : "접기"}>

        <span>{heading}</span>
        {showCount ? <span className="ml-1 text-[color:var(--ember)] num">({selectedCount})</span> : null}
      </button>
      {!isCollapsed && selectedCount > 0 && (
        <button
          onClick={(e) => { e.preventDefault(); onClear(); }}
          className="chip"
          style={{ background: "rgba(26,26,23,0.04)", color: "rgba(26,26,23,0.55)", borderColor: "rgba(26,26,23,0.18)" }}
          title="이 차원 선택 해제">×</button>
      )}
      {!isCollapsed && items.map(it => (
        <MultiChip
          key={it.value}
          value={it.value}
          label={it.label}
          count={it.count}
          active={set ? set.has(it.value) : false}
          onPick={onToggle}
        />
      ))}
    </div>
  );
}

function FilterBar({ filters, setFilters, clearAll, facets, rows, mgmtLevelCounts, featuredAxes }) {
  // Sido list from /facets.regions (de-duplicated)
  const sidoSet = useMemo(
    () => Array.from(new Set((facets.regions || []).map(r => r.sido).filter(Boolean))).sort(),
    [facets]
  );

  // Bucket /facets.concepts by category. Backend `concept=<id>` matches by
  // ID (English), so keep the ID as `value` and use Korean `name` as label.
  const conceptsByCat = useMemo(() => {
    const buckets = {};
    for (const c of (facets.concepts || [])) {
      if (!c || (c.count || 0) <= 0) continue;
      const cat = c.category || "_other";
      if (!buckets[cat]) buckets[cat] = [];
      buckets[cat].push({ value: c.id, label: c.name, count: c.count });
    }
    // Keep top 40 per bucket to avoid drowning the UI
    for (const k of Object.keys(buckets)) {
      buckets[k].sort((a, b) => (b.count || 0) - (a.count || 0));
      buckets[k] = buckets[k].slice(0, 40);
    }
    return buckets;
  }, [facets]);

  // Concept axes (is_axis=true). Drop ones already covered by the 대표축 row
  // (계곡/키즈캠핑) — trampoline isn't a concept axis so this is fine.
  const conceptAxes = useMemo(
    () => (facets.concept_axes || [])
      .filter(c => (c.count || 0) > 0)
      .filter(c => c.id !== "valley" && c.id !== "kids")
      .map(c => ({ value: c.id, label: c.name, count: c.count })),
    [facets]
  );

  // Terrain — aggregate r.location_types over rows (this is per-camp raw data).
  const terrainItems = useMemo(() => {
    const counts = new Map();
    for (const r of (rows || [])) {
      for (const t of (r.location_types || [])) counts.set(t, (counts.get(t) || 0) + 1);
    }
    return [...counts.entries()]
      .sort((a, b) => b[1] - a[1])
      .map(([code, count]) => ({ value: code, label: TERRAIN_LABEL[code] || code, count }));
  }, [rows]);

  // Facility (raw English codes from r.facilities) — aggregate over rows.
  // This is where 트램펄린 lives now (camfit raw `trampoline`).
  const facilityRawItems = useMemo(() => {
    const counts = new Map();
    for (const r of (rows || [])) {
      for (const f of (r.facilities || [])) counts.set(f, (counts.get(f) || 0) + 1);
    }
    return [...counts.entries()]
      .sort((a, b) => b[1] - a[1])
      .slice(0, 30)
      .map(([code, count]) => ({ value: code, label: FACILITY_LABEL[code] || code, count }));
  }, [rows]);

  // Collections — `콜렉션:*` / `테마:*` in r.categories.

    const counts = new Map();

    return [...counts.entries()]

  // Management — fixed 4 levels, counts from useMemo over the global mark map.

  useEffect(() => {

      {!semanticCollapsed && (<>
      <FilterRow

      <FilterRow

      <FilterRow

      {/* ── 직접 필터 — read raw fields off /sites rows ── */}
      <button
        type="button"

        className="w-full text-left text-[10px] uppercase tracking-[0.2em] text-stone-400 pt-1 border-t hairline inline-flex items-center gap-1.5 hover:text-stone-600">
        <span className="opacity-50 num" style={{ width: "0.7em", display: "inline-block", textAlign: "center" }}>{directCollapsed ? "▸" : "▾"}</span>

// SearchBox — semantic search via /sites/search?q=…
// Pattern adapted from fe/graph.html SearchBox; result shape
// here is the flat _camp_to_fe_row dict (id/name/sido/sigungu/...).
// ─────────────────────────────────────────────────────────────
function SearchBox({ onPickResult, axes }) {
  const [q, setQ] = useState("");
  const [results, setResults] = useState([]);
  const [open, setOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const tRef = useRef(null);

  useEffect(() => {
    if (tRef.current) clearTimeout(tRef.current);
    if (!q.trim()) { setResults([]); setOpen(false); return; }
    setBusy(true);
    tRef.current = setTimeout(() => {
      fetch(`${API}/sites/search?q=${encodeURIComponent(q.trim())}&k=20`)
        .then(r => r.json())
        .then(d => {
          const arr = Array.isArray(d) ? d : (d.results || d.hits || []);
          setResults(arr);
          setOpen(true);
        })
        .catch(() => setResults([]))
        .finally(() => setBusy(false));
    }, 250);
  }, [q]);

  const apply = (asList) => {
    onPickResult(asList);
    setOpen(false);
  };

  return (
    <div className="relative">
      <input
        value={q}
        onChange={(e) => setQ(e.target.value)}
        onFocus={() => results.length && setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 180)}
        onKeyDown={(e) => {
          if (e.key === "Enter" && results.length > 0) {
            e.preventDefault();
            apply(results);
          }
          if (e.key === "Escape") { setOpen(false); }
        }}

function minutesFrom(h, m) { return Math.max(0, (h | 0) * 60 + (m | 0)); }

function App() {
  const [view, setView] = useState("split"); // split | map | list
  const featuredAxes = useFeaturedAxes();
  const userLoc = useUserLocation();
  // Multi-select chip state — every long-tail dimension is a Set<string>.
  // The 대표축 row stays as one boolean per axis (`has_<id>`) because the
  // shortcuts are independent toggles, not a multi-pick set. New axes added
  // to the registry get their booleans created lazily on first toggle.
  const [filters, setFilters] = useState(() => ({
    region:        new Set(),       // sido values; sent server-side when size===1, else client-side
    conceptAxis:   new Set(),       // concept ids from facets.concept_axes
    view:          new Set(),       // facets.concepts where category='view'
    facility:      new Set(),       // facets.concepts where category='facility'
    kidsFacility:  new Set(),       // facets.concepts where category='kids_facility'
    surface:       new Set(),       // facets.concepts where category='surface'
    space:         new Set(),       // facets.concepts where category='space'
    parking:       new Set(),       // facets.concepts where category='parking'
    audience:      new Set(),       // facets.concepts where category='audience'
    vibe:          new Set(),       // facets.concepts where category='vibe'
    terrain:       new Set(),       // r.location_types codes (client-side)
    collection:    new Set(),       // 콜렉션:* / 테마:* in r.categories (client-side)
    facilityRaw:   new Set(),       // r.facilities raw codes (client-side, where 트램펄린 lives)
    management:    new Set(),       // mark-axis levels — bib/recommended/notable/exceptional
    // has_<id> booleans for featured axes — set lazily as user toggles chips
  }));
  const clearAll = useCallback(() => {
    setFilters(prev => {
      const next = {};
      for (const k of Object.keys(prev)) {
        if (prev[k] instanceof Set) next[k] = new Set();
        else if (k.startsWith("has_")) next[k] = false;
      }
      return next;
    });
  }, []);
  const [pickedId, setPickedId] = useState(null);
  // null when search isn't active; array when it is. When set, overrides
  // the /sites result for both the list and the map.
  const [searchResults, setSearchResults] = useState(null);
  const { data: facets, err: facetsErr } = useFacets();
  const { rows: sitesRows, loading, err } = useSites(filters);
  const managementCampLevels = useManagementMarks();
  const mgmtLevelCounts = useMemo(() => {
    const m = { exceptional: 0, notable: 0, recommended: 0, bib: 0 };
    if (managementCampLevels) for (const lv of managementCampLevels.values()) {
      if (m[lv] != null) m[lv]++;
    }
    return m;
  }, [managementCampLevels]);
  // Effective rows pre-clientside-filtering: search results take priority.
  const rows = useMemo(
    () => (searchResults != null ? searchResults : sitesRows),
    [searchResults, sitesRows]
  );

  // ETA state
  const [origin, setOrigin] = useState("");
  const [etaHours, setEtaHours] = useState(2);
  const [etaMins, setEtaMins] = useState(0);
  const [etaMap, setEtaMap] = useState(null);   // { camp_id: {minutes, within, source, error} }
  const [etaActive, setEtaActive] = useState(true);   // hide-out-of-range when true
  const [etaSummary, setEtaSummary] = useState(null);
  const [etaLoading, setEtaLoading] = useState(false);
  const etaAbortRef = useRef(null);

  // Hard ceiling on the number of camps to ETA-check in one shot. With every
  // road call costing ~1-3s through etago and concurrency capped at 4, going
  // past ~300 candidates is what made the 1,656-camp blanket request feel
  // hung. The user is expected to narrow with filters first; the warning
  // below makes that explicit when the candidate set is still too large.
  const ETA_HARD_CAP = 300;

  // List of camps that ETA SHOULD run against — every active filter
  // applied EXCEPT the ETA layer itself. Defined before applyEta and
  // visibleRows so both can read it; the candidate set is what the user
  // already narrowed via region/concept/has_*/terrain/collection chips.
  const preEtaRows = useMemo(() => {
    let out = rows;
    // Featured axes — registry-driven boolean ANDs.
    for (const a of featuredAxes) {
      if (filters[`has_${a.id}`]) out = out.filter(r => r[`has_${a.id}`]);
    }
    if (filters.region.size > 1) out = out.filter(r => filters.region.has(r.sido));
    if (filters.terrain.size > 0) {
      out = out.filter(r => {
        const set = new Set(r.location_types || []);
        for (const t of filters.terrain) if (!set.has(t)) return false;
        return true;
      });
    }
    if (filters.facilityRaw.size > 0) {
      out = out.filter(r => {
        const fac = new Set(r.facilities || []);
        for (const f of filters.facilityRaw) if (!fac.has(f)) return false;
        return true;
      });
    }
    if (filters.collection.size > 0) {
      out = out.filter(r => {
        const set = new Set(r.categories || []);
        for (const c of filters.collection) if (!set.has(c)) return false;
        return true;
      });
    }
    if (filters.management.size > 0 && managementCampLevels) {
      out = out.filter(r => {
        const lvl = managementCampLevels.get(r.id);
        return lvl != null && filters.management.has(lvl);
      });
    }
    return out;
  }, [rows, filters, managementCampLevels, featuredAxes]);

  const applyEta = useCallback(async () => {
    if (!origin.trim() || preEtaRows.length === 0) return;
    if (etaAbortRef.current) etaAbortRef.current.abort();

    // Restrict to camps that have coordinates — Haversine pre-filter on the
    // server can't admit/reject rows without lat/lon, so we just don't ask.
    const candidates = preEtaRows.filter(r => r.lat != null && r.lon != null);

    if (candidates.length > ETA_HARD_CAP) {
      const proceed = confirm(
        `${candidates.length}개 캠프에 ETA 계산을 시도합니다 (캠프당 ~1–3초). ` +
        `시간이 오래 걸릴 수 있습니다. 먼저 지역/컨셉 필터로 ${ETA_HARD_CAP}개 이하로 줄이시면 빠릅니다.\n\n` +
        `그래도 진행하시겠습니까?`
      );
      if (!proceed) return;
    }

    const ctrl = new AbortController();
    etaAbortRef.current = ctrl;
    const max = minutesFrom(etaHours, etaMins) || null;
    setEtaLoading(true);
    try {
      const res = await fetchEtaBatch({
        origin: origin.trim(),
        ids: candidates.map(r => r.id),
        max_minutes: max,
        signal: ctrl.signal,
      });
      const m = {};
      for (const it of res.results) m[it.id] = it;
      setEtaMap(m);
      setEtaSummary({ within_count: res.within_count, checked: res.checked });
    } catch (e) {
      if (e.name !== "AbortError") {
        alert(`ETA 적용 실패: ${e.message}`);
      }
    } finally {
      setEtaLoading(false);
    }
  }, [origin, etaHours, etaMins, preEtaRows]);

  const clearEta = useCallback(() => {
    setEtaMap(null); setEtaSummary(null);
    fetch(`${API}/eta/cache`, { method: "DELETE" }).catch(() => {});
  }, []);

  // visibleRows = preEtaRows + ETA layer (when applied & active) + sort by
  // straight-line distance from the user's current location (when known).
  // _distanceKm is attached per row so the list card can render a "내 위치
  // ~24 km" badge without recomputing.
  const visibleRows = useMemo(() => {
    let out = preEtaRows;
    if (etaMap && etaActive) {
      out = out.filter(r => {
        const e = etaMap[r.id];
        return e && e.within;
      });
    }
    if (userLoc.coords) {
      const { lat: ulat, lon: ulon } = userLoc.coords;
      const withDist = out.map(r => {
        if (r.lat == null || r.lon == null) return { ...r, _distanceKm: null };
        return { ...r, _distanceKm: haversineKm(ulat, ulon, r.lat, r.lon) };
      });
      // Camps without coordinates fall to the bottom; geocoded ones sort
      // closest-first.
      withDist.sort((a, b) => {
        if (a._distanceKm == null && b._distanceKm == null) return 0;
        if (a._distanceKm == null) return 1;
        if (b._distanceKm == null) return -1;
        return a._distanceKm - b._distanceKm;
      });
      return withDist;
    }
    return out;
  }, [preEtaRows, etaMap, etaActive, userLoc.coords]);

  const focused = useMemo(() => visibleRows.find(r => r.id === pickedId) || null, [visibleRows, pickedId]);

  const total = visibleRows.length;
  const withCoord = visibleRows.filter(r => r.lat != null && r.lon != null).length;
  // Featured-axis counts for the header stat. Each entry is `{ko, n}`;
  // the Stat below renders them as "ko1 ko2 ko3 / n1 n2 n3" for whatever
  // registry currently exposes.
  const featuredCounts = useMemo(
    () => featuredAxes.map(a => ({
      ko: a.ko, icon: a.icon,
      n: visibleRows.filter(r => r[`has_${a.id}`]).length,
    })),
    [visibleRows, featuredAxes]
  );

  // List pagination + responsive infinite scroll. Only `displayCount` rows
  // are mounted; an IntersectionObserver on a bottom sentinel grows the
  // window in LIST_PAGE_SIZE steps. Reset on visibleRows change (filter /
  // search / ETA toggle) and on view toggle (when the list section
  // unmounts/remounts the scroll container).
  const LIST_PAGE_SIZE = 30;
  const [displayCount, setDisplayCount] = useState(LIST_PAGE_SIZE);
  const listScrollRef = useRef(null);
  const sentinelRef = useRef(null);
  useEffect(() => {
    setDisplayCount(LIST_PAGE_SIZE);
    if (listScrollRef.current) listScrollRef.current.scrollTop = 0;
  }, [visibleRows]);
  useEffect(() => {
    const sentinel = sentinelRef.current;
    const root = listScrollRef.current;
    if (!sentinel || !root) return;
    const obs = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) {
          setDisplayCount(c => Math.min(c + LIST_PAGE_SIZE, visibleRows.length));
        }
      },
      { root, rootMargin: "300px 0px" }
    );
    obs.observe(sentinel);
    return () => obs.disconnect();
  }, [visibleRows, view]);
  const displayedRows = useMemo(
    () => visibleRows.slice(0, displayCount),
    [visibleRows, displayCount]
  );

  return (
    <div className="h-screen flex flex-col overflow-hidden">
      {/* Header */}
      <header className="topo border-b hairline flex-shrink-0">
        <div className="max-w-[1500px] mx-auto px-6 py-5 flex items-end justify-between gap-6">
          <div>
            <div className="flex items-center gap-3">
              <svg width="34" height="34" viewBox="0 0 40 40" className="opacity-90">
                <path d="M3 32 L20 6 L37 32 Z" fill="none" stroke="#2c4a3e" strokeWidth="2" strokeLinejoin="round"/>
                <path d="M11 32 L20 18 L29 32 Z" fill="#2c4a3e"/>
                <circle cx="32" cy="11" r="2.5" fill="#c8553d"/>
              </svg>
              <div>
                <div className="text-[10px] uppercase tracking-[0.3em] text-stone-500 font-medium">camfit-puller</div>
                <h1 className="display text-2xl font-bold leading-none mt-0.5">한국 캠핑장 지도</h1>
              </div>
            </div>
          </div>
          <div className="hidden md:flex gap-6 items-end">
            <Stat label="총" value={total.toLocaleString()} sub="필터 적용 후" />
            <Stat label="좌표" value={`${withCoord}`} sub={total ? `${Math.round(withCoord/total*100)}%` : "—"} />
            {featuredCounts.length > 0 && (
              <Stat
                label={featuredCounts.map(c => c.icon).join(" ")}
                value={featuredCounts.map(c => c.n).join(" / ")}
              />
            )}
            <LocationPill userLoc={userLoc} />
            <SearchBox axes={featuredAxes} onPickResult={(arr) => {
              // arr is the array of search hits (or a single-item array when
              // a row was picked). Replace effective rows + fly to first.
              setSearchResults(arr);
              if (arr && arr.length > 0 && arr[0].id != null) setPickedId(arr[0].id);
            }} />
            <div className="toggle-pill">
              <button className={view === "split" ? "active" : ""} onClick={() => setView("split")}>분할</button>
              <button className={view === "map" ? "active" : ""} onClick={() => setView("map")}>지도</button>
              <button className={view === "list" ? "active" : ""} onClick={() => setView("list")}>리스트</button>
            </div>
            <a href="/graph.html" className="btn">그래프 →</a>
          </div>
        </div>
        <div className="max-w-[1500px] mx-auto px-6 pb-4 space-y-3">
          {searchResults != null && (
            <div className="flex items-center gap-2 text-[12px] px-3 py-2 rounded-lg border hairline"
                 style={{ background: "rgba(200,85,61,0.08)", color: "var(--ember)", borderColor: "rgba(200,85,61,0.25)" }}>
              <span>🔎 검색결과 <span className="num font-semibold">{searchResults.length}</span>건 표시 중</span>
              <button onClick={() => setSearchResults(null)} className="btn ml-auto">전체보기</button>
            </div>
          )}
          <FilterBar
            filters={filters}
            setFilters={setFilters}
            clearAll={clearAll}
            facets={facets}
            rows={rows}
            mgmtLevelCounts={mgmtLevelCounts}
            featuredAxes={featuredAxes}
          />
          <EtaBar
            origin={origin} setOrigin={setOrigin}
            hours={etaHours} setHours={setEtaHours}
            mins={etaMins} setMins={setEtaMins}
            etaActive={etaActive} setEtaActive={setEtaActive}
            onApply={applyEta} onClear={clearEta}
            loading={etaLoading} summary={etaSummary}
            candidateCount={preEtaRows.filter(r => r.lat != null && r.lon != null).length}
            hardCap={ETA_HARD_CAP}
          />
        </div>
      </header>

      {/* Main */}
      <main className="flex-1 min-h-0 max-w-[1500px] w-full mx-auto px-6 py-5 grid gap-5 overflow-hidden"
        style={{
          gridTemplateColumns: view === "split" ? "minmax(340px, 420px) 1fr" : "1fr",
        }}>
        {(view === "split" || view === "list") && (
          <section ref={listScrollRef} className="min-h-0 h-full overflow-y-auto pr-1">
            {loading && <div className="text-xs text-stone-500 mb-2">불러오는 중…</div>}
            {err && <div className="text-xs text-[color:var(--ember)] mb-2">API 연결 실패: {err}</div>}
            <CampList
              rows={displayedRows}
              onPick={setPickedId}
              selectedId={pickedId}
              etaMap={etaMap}
              axes={featuredAxes}
            />
            {visibleRows.length > 0 && displayCount < visibleRows.length && (
              <div ref={sentinelRef} className="text-center text-[11px] text-stone-500 py-4">
                더 불러오는 중… <span className="num">{displayCount} / {visibleRows.length.toLocaleString()}</span>
              </div>
            )}
            {visibleRows.length > 0 && displayCount >= visibleRows.length && (
              <div className="text-center text-[11px] text-stone-400 py-3">
                — 끝 (<span className="num">{visibleRows.length.toLocaleString()}</span>곳) —
              </div>
            )}
          </section>
        )}
        {(view === "split" || view === "map") && (
          <section className="card overflow-hidden h-full min-h-0">
            <MapView rows={visibleRows} onPick={setPickedId} focused={focused} etaMap={etaMap} axes={featuredAxes} userLoc={userLoc} />
          </section>
        )}
      </main>

      <footer className="border-t hairline text-[11px] text-stone-500 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <span>지도 © OpenStreetMap contributors · 데이터: camfit-puller crawl</span>
        <span className="num">단축키: <span className="kbd">esc</span> 패널 닫기</span>
      </footer>

      <DetailPanel
        id={pickedId}
        onClose={() => setPickedId(null)}
        eta={pickedId && etaMap ? etaMap[pickedId] : null}
        axes={featuredAxes}
      />
    </div>
  );
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const ev = new CustomEvent("camfit:close-detail");
    window.dispatchEvent(ev);
  }
});

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
